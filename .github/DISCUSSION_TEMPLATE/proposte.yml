title: "[Progetto] Titolo del progetto"
body:
  - type: markdown
    attributes:
      value: |
        Usa questo template per proporre un nuovo filone già abbastanza maturo da essere discusso come progetto.

        Se hai solo una fonte dati o una domanda iniziale, usa prima i template `Dataset` o `Domanda`.

  - type: textarea
    id: domanda
    attributes:
      label: Domanda civica
      description: Una sola frase chiara.
    validations:
      required: true

  - type: textarea
    id: obiettivo
    attributes:
      label: Obiettivo del progetto
      description: Cosa produrremo e per chi?
    validations:
      required: true

  - type: textarea
    id: dataset
    attributes:
      label: Dataset coinvolti
      description: Dataset, fonte, periodo, livello o unità di analisi.

  - type: textarea
    id: stato_attuale
    attributes:
      label: Stato attuale
      description: Cosa esiste già? Es. intake, preanalysis privata, notebook v0, output minimo.

  - type: dropdown
    id: output
    attributes:
      label: Output previsto
      options:
        - Discussion / preanalysis
        - Report / nota
        - Dashboard / pagina pubblica
        - Altro

  - type: dropdown
    id: complessita
    attributes:
      label: Complessità stimata
      options:
        - Bassa
        - Media
        - Alta
