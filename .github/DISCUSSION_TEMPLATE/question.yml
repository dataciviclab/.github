title: "[Question] "
body:
  - type: markdown
    attributes:
      value: |
        Usa questo template per fare una domanda pubblica o chiedere orientamento.
  - type: textarea
    id: question
    attributes:
      label: Domanda
      description: Spiega cosa vuoi capire o decidere
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Repository coinvolto
      placeholder: Se lo sai gia'
  - type: textarea
    id: context
    attributes:
      label: Contesto utile
      description: Link, riferimenti o tentativi gia' fatti
