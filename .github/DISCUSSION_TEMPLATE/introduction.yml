title: "[Intro] "
body:
  - type: markdown
    attributes:
      value: |
        Usa questo template per presentarti alla community e dire da dove vuoi iniziare.
  - type: textarea
    id: who
    attributes:
      label: Chi sei
      description: Una breve presentazione
    validations:
      required: true
  - type: textarea
    id: interests
    attributes:
      label: Cosa ti interessa
      description: Temi, repository o tipi di contributo che ti attirano
  - type: textarea
    id: help
    attributes:
      label: Come possiamo orientarti
      description: Se hai gia' una domanda o un primo passo in mente
