name: Change request
description: Proponi un miglioramento concreto o un lavoro da fare
title: "[Change] "
labels:
  - needs-triage
body:
  - type: textarea
    id: outcome
    attributes:
      label: Cosa dovrebbe cambiare
      description: Descrivi il risultato atteso in modo concreto
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Perche' serve
      description: Spiega il problema o l'opportunita' che questa issue affronta
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Repository coinvolto
      placeholder: es. .github, toolkit, project-template
  - type: textarea
    id: done
    attributes:
      label: Quando possiamo considerarla chiusa
      description: Elenca i criteri minimi di completamento
      placeholder: |
        - ...
        - ...
  - type: textarea
    id: links
    attributes:
      label: Collegamenti utili
      description: Discussion, issue o PR correlate
